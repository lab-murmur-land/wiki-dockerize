version: '3'
services:
  mediawiki:
    build: ./mediawiki
    ports:
      - 8080:80
    restart: always
    links:
      - database
    depends_on:
      database:
        condition: service_healthy
    volumes:
      # - /var/www/test:/var/www/html
      # - /var/www/wiki.murmur.land/:/var/www/html
      - images:/var/www/html/images
      # After initial setup, download LocalSettings.php to the same directory as
      # this yaml and uncomment the following line and use compose to restart
      # the mediawiki service
      # - ./LocalSettings.php:/var/www/html/LocalSettings.php
      # This kath /home/g0aeonchannel0/wiki.murmur.land/stack/testimage either does not exist, is not accessible, or is not a valid URL.ey also defines the name of the database host used during setup instead of the default "localhost"
    # network_mode: host
    # networks:
    #   - wiki-db
    env_file:
      - ../.env
  database:
    # networks:
    #   - wiki-db
    # network_mode: host
    build: ./database
    restart: always
    # environment:
    #   # @see https://phabricator.wikimedia.org/source/mediawiki/browse/master/includes/DefaultSettings.php
    env_file:
      - ../.env
    volumes:
      - db:/var/lib/mysql

# networks:
#   wiki-db:
#     driver: bridge

volumes:
  images:
  db:
